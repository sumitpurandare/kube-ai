apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: kube-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
      - name: ai-engine
        image: ai-engine:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8001